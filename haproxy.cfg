global
    # Basic global settings
    maxconn 4096
    # console logging
    log stdout format raw local0

defaults
    mode http
    timeout connect 5s
    timeout client 60s
    timeout server 60s
    log global
    option httplog

# Plain HTTP front-end. TLS is terminated upstream by Coolify/Traefik, which
# forwards plain HTTP to this port.
frontend http_front
    bind *:8080
    default_backend app_backend

backend app_backend
    server app1 [::1]:4213
    # DuckDB UI only accepts loopback Host/Origin -> rewrite them
    http-request set-header Host [::1]:4213
    http-request set-header Origin http://localhost:4213
    http-request set-header Referer http://localhost:4213/
    http-request del-header X-Forwarded-For
    http-request del-header X-Forwarded-Proto
    http-request del-header X-Forwarded-Port
